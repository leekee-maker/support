<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>habit star - 技术支持</title>
  <meta name="description" content="habit star 技术支持页面">
  <style>
    :root {
      --bg: #0b0c0f;
      --panel: #17191f;
      --text: #f4f7fb;
      --muted: #9da8b8;
      --accent: #56d4d4;
      --line: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: min(860px, calc(100% - 40px));
      margin: 0 auto;
      padding: 64px 0;
    }
    .panel {
      padding: 36px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 40px;
    }
    p, li {
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
    }
    h2 {
      margin-top: 30px;
      margin-bottom: 10px;
      font-size: 20px;
    }
    ul {
      padding-left: 20px;
      margin: 0;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>habit star 技术支持</h1>
      <p>如果你在使用过程中遇到问题，可以通过以下方式获取帮助。</p>

      <h2>常见问题</h2>
      <ul>
        <li>如果会员状态没有更新，可在 App 内“设置 - 恢复购买”中尝试恢复。</li>
        <li>如果提醒没有生效，请检查系统通知权限是否已开启。</li>
        <li>如果打卡数据显示异常，建议重新打开 App 后再查看。</li>
      </ul>

      <h2>联系我们</h2>
      <p>支持邮箱：<a href="mailto:leekee-maker@outlook.com">leekee-maker@outlook.com</a></p>

      <h2>应用信息</h2>
      <p>应用名称：habit star</p>
      <p>副标题：习惯打卡助手</p>

      <h2>更多信息</h2>
      <p><a href="../">返回首页</a></p>
    </section>
  </main>
</body>
</html>
