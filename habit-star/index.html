<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>habit star</title>
  <meta name="description" content="habit star 是一款简洁的习惯打卡应用，帮助你记录每天想坚持的小目标。">
  <style>
    :root {
      --bg: #0b0c0f;
      --panel: #17191f;
      --text: #f4f7fb;
      --muted: #9da8b8;
      --accent: #56d4d4;
      --accent-soft: rgba(86, 212, 212, 0.16);
      --line: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(86, 212, 212, 0.18), transparent 28%),
        radial-gradient(circle at left center, rgba(86, 212, 212, 0.12), transparent 24%),
        var(--bg);
      color: var(--text);
    }
    .wrap {
      width: min(960px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }
    .hero {
      padding: 48px;
      border: 1px solid var(--line);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
    }
    h1 {
      margin: 18px 0 14px;
      font-size: clamp(42px, 8vw, 76px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }
    .lead {
      max-width: 640px;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 34px;
    }
    .card {
      padding: 22px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 14px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="badge">App Store</div>
      <h1>habit star</h1>
      <p class="lead">一款简洁的习惯打卡应用。创建自己的日常目标，查看每日完成情况，用更轻松的方式坚持每一天。</p>

      <div class="grid">
        <article class="card">
          <h2>今天页</h2>
          <p>集中查看待完成习惯，勾选状态一目了然。</p>
        </article>
        <article class="card">
          <h2>日历回顾</h2>
          <p>按日期查看历史打卡记录，回看每一天的坚持轨迹。</p>
        </article>
        <article class="card">
          <h2>统计分析</h2>
          <p>查看连续天数、完成率和累计次数，进度更直观。</p>
        </article>
        <article class="card">
          <h2>自定义习惯</h2>
          <p>自由设置名称、图标、颜色和提醒，建立属于你的节奏。</p>
        </article>
      </div>

      <p class="footer">
        技术支持：<a href="./support/">support</a>
      </p>
    </section>
  </main>
</body>
</html>
